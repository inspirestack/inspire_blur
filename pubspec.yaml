name: inspire_blur
description: A modern, high-performance, GPU-friendly progressive blur for Flutter.
version: 0.1.0

homepage: https://inspirestack.app
repository: https://github.com/inspirestack/inspire_blur
issue_tracker: https://github.com/inspirestack/inspire_blur/issues

topics:
  - inspire
  - blur
  - progressive
  - shader
  - ui
  - effects
  - flutter

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_shaders: ^0.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  shaders:
    - shaders/inspire_blur_backdrop.frag
    - shaders/inspire_blur_child.frag
