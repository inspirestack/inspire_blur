name: inspire_blur
description: A modern, high-performance progressive blur for Flutter — powered by custom GPU shaders.
version: 0.2.0

homepage: https://inspirestack.app/inspire-blur
repository: https://github.com/inspirestack/inspire_blur
issue_tracker: https://github.com/inspirestack/inspire_blur/issues

topics:
  - blur
  - progressive-blur
  - variable-blur
  - glassmorphism
  - impeller

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_shaders: ^0.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  shaders:
    - shaders/inspire_blur_backdrop.frag
    - shaders/inspire_blur_child.frag
